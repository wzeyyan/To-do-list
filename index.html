<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Task & Calendar Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 min-h-screen">
    <!-- Toast Notification Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <header class="mb-8">
            <h1 class="text-[clamp(1.8rem,3vw,2.5rem)] font-bold text-slate-800">Personal Task Manager | Calendar</h1>
        </header>

        <!-- Top Controls: Search + Filters + Add Task -->
        <div class="bg-white rounded-xl shadow p-4 mb-6 grid md:grid-cols-5 grid-cols-1 gap-3">
            <div class="md:col-span-2">
                <input type="text" id="searchInput" placeholder="Search task title/description..." class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <select id="filterCategory" class="border rounded-lg px-3 py-2">
                <option value="all">All Categories</option>
                <option value="Work">Work</option>
                <option value="Personal">Personal</option>
                <option value="Study">Study</option>
                <option value="Other">Other</option>
            </select>
            <select id="filterPriority" class="border rounded-lg px-3 py-2">
                <option value="all">All Priority</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>
            <select id="filterStatus" class="border rounded-lg px-3 py-2">
                <option value="all">All Status</option>
                <option value="false">Pending</option>
                <option value="true">Completed</option>
            </select>
            <button id="openTaskModalBtn" class="bg-blue-600 text-white rounded-lg py-2 px-4 hover:bg-blue-700 transition">+ New Task</button>
        </div>

        <!-- View Toggle: Month / Week -->
        <div class="flex gap-3 mb-4">
            <button data-view="month" class="viewSwitch px-4 py-2 rounded-lg bg-blue-600 text-white">Monthly View</button>
            <button data-view="week" class="viewSwitch px-4 py-2 rounded-lg bg-slate-300">Weekly View</button>
        </div>

        <!-- Calendar Area -->
        <div class="bg-white rounded-xl shadow p-4 mb-6">
            <div class="flex justify-between items-center mb-3">
                <h2 id="calendarHeader" class="text-xl font-semibold"></h2>
                <div class="flex gap-2">
                    <button id="prevDate" class="px-3 py-1 border rounded hover:bg-slate-100">&lt;</button>
                    <button id="todayBtn" class="px-3 py-1 border rounded hover:bg-slate-100">Today</button>
                    <button id="nextDate" class="px-3 py-1 border rounded hover:bg-slate-100">&gt;</button>
                </div>
            </div>
            <div id="calendarWrap"></div>
        </div>

        <!-- Task List Area -->
        <div class="bg-white rounded-xl shadow p-4">
            <h3 class="text-lg font-semibold mb-3">Filtered Task List</h3>
            <div id="taskListWrap" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </div>

    <!-- Add/Edit Task Modal -->
    <div id="taskModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-40">
        <div class="bg-white rounded-xl w-full max-w-lg p-5 m-4">
            <h3 id="modalTitle" class="text-xl font-bold mb-4">Create New Task</h3>
            <form id="taskForm" class="flex flex-col gap-3">
                <input type="hidden" id="taskId">
                <div>
                    <label class="block mb-1 text-sm font-medium">Title</label>
                    <input required id="taskTitle" class="w-full border rounded px-3 py-2">
                </div>
                <div>
                    <label class="block mb-1 text-sm font-medium">Description</label>
                    <textarea id="taskDesc" rows="3" class="w-full border rounded px-3 py-2"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block mb-1 text-sm font-medium">Priority</label>
                        <select id="taskPriority" class="w-full border rounded px-3 py-2">
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-medium">Category</label>
                        <select id="taskCategory" class="w-full border rounded px-3 py-2">
                            <option value="Work">Work</option>
                            <option value="Personal">Personal</option>
                            <option value="Study">Study</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block mb-1 text-sm font-medium">Due Date</label>
                        <input type="date" id="taskDueDate" class="w-full border rounded px-3 py-2">
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-medium">Due Time</label>
                        <input type="time" id="taskDueTime" class="w-full border rounded px-3 py-2">
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-2">
                    <button type="button" id="closeModal" class="px-4 py-2 border rounded hover:bg-slate-100">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Reschedule Quick Modal -->
    <div id="rescheduleModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-40">
        <div class="bg-white rounded-xl p-5 max-w-sm w-full m-4">
            <h4 class="font-bold mb-3">Reschedule Selected Task</h4>
            <input type="hidden" id="rescheduleTaskId">
            <label class="block mb-1">New Due Date</label>
            <input type="date" id="newReschedDate" class="border w-full rounded mb-3">
            <div class="flex justify-end gap-2">
                <button id="cancelResched" class="px-3 py-1 border rounded">Cancel</button>
                <button id="saveResched" class="px-3 py-1 bg-green-500 text-white rounded">Save</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
